<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>

  <!-- Candlestick 1 (Red/Down) -->
  <line x1="28" y1="35" x2="28" y2="45" stroke="#ef5350" stroke-width="2" stroke-linecap="round"/>
  <rect x="22" y="45" width="12" height="25" rx="2" fill="#ef5350"/>
  <line x1="28" y1="70" x2="28" y2="80" stroke="#ef5350" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 2 (Green/Up) -->
  <line x1="50" y1="50" x2="50" y2="60" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>
  <rect x="44" y="60" width="12" height="30" rx="2" fill="#66bb6a"/>
  <line x1="50" y1="90" x2="50" y2="100" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 3 (Green/Up) -->
  <line x1="72" y1="40" x2="72" y2="48" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>
  <rect x="66" y="48" width="12" height="35" rx="2" fill="#66bb6a"/>
  <line x1="72" y1="83" x2="72" y2="93" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 4 (Green/Up - Tallest) -->
  <line x1="94" y1="28" x2="94" y2="35" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>
  <rect x="88" y="35" width="12" height="42" rx="2" fill="#66bb6a"/>
  <line x1="94" y1="77" x2="94" y2="87" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>

  <!-- Trend Arrow -->
  <path d="M 15 105 Q 40 95, 65 90 T 115 75" stroke="#4fc3f7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 115 75 L 108 73 L 111 80 Z" fill="#4fc3f7"/>
</svg>
