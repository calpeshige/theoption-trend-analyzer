<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1420">
  <title>TheOption シグナル</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TheOption">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="app-header">
    <span class="app-title">📈 TheOption シグナル</span>
    <span class="pc-status" id="pc-status">--</span>
  </header>

  <!-- ログイン画面 -->
  <section class="screen login-screen" id="login-screen" hidden>
    <div class="login-card">
      <h1 class="login-title">スマホ連携</h1>
      <p class="login-desc">PCで発行したスマホ版ライセンスキー（MOB-）を入力してください。</p>
      <input type="text" class="login-input" id="license-input" placeholder="MOB-XXXX-XXXX-XXXX" autocapitalize="characters" autocomplete="off" spellcheck="false">
      <button class="login-button" id="login-button">認証して接続</button>
      <p class="login-error" id="login-error" hidden></p>
      <p class="login-hint" id="login-hint"></p>
    </div>
  </section>

  <!-- メイン画面 -->
  <main class="screen main-screen" id="main-screen" hidden>
    <!-- 準備カウントダウン -->
    <section class="prep-bar" id="prep-bar">
      <span class="prep-asset" id="prep-asset">--</span>
      <div class="prep-count">
        <span class="prep-label" id="prep-label">次の判定まで</span>
        <span class="prep-value" id="prep-value">--</span>
      </div>
      <span class="prep-tf" id="prep-tf">--</span>
    </section>

    <!-- エントリーシグナル強調（HIGH/LOW時のみ） -->
    <section class="entry-banner" id="entry-banner" hidden>
      <span class="entry-arrow" id="entry-arrow">▲</span>
      <span class="entry-text" id="entry-text">エントリー HIGH</span>
      <span class="entry-stars" id="entry-stars"></span>
    </section>

    <!-- TheOptionで取引（手動発注。タップで取引画面へ移動） -->
    <a class="trade-button" id="trade-button" href="https://jp.theoption.com/trading" target="_blank" rel="noopener noreferrer">
      📈 TheOptionで取引する
    </a>

    <!-- テクニカル / AI予測 左右パネル -->
    <section class="analysis-panels">
      <div class="panel tech-panel" id="tech-panel">
        <div class="panel-title">📊 テクニカル</div>
        <div class="panel-dir" id="tech-dir">--</div>
        <div class="panel-stars" id="tech-stars"></div>
        <div class="panel-sub" id="tech-sub">20指標 --</div>
      </div>
      <div class="panel ai-panel" id="ai-panel">
        <div class="panel-title">🤖 AI予測</div>
        <div class="panel-dir" id="ai-dir">--</div>
        <div class="panel-rates" id="ai-rates">--</div>
        <div class="panel-sub" id="ai-sub">学習 --</div>
      </div>
    </section>

    <!-- 急変検出ボックス（テクニカル/AIの下） -->
    <section class="reversal-box" id="reversal-box">
      <span class="reversal-box-title">⚡ 急変検出</span>
      <span class="reversal-box-status" id="reversal-status">—</span>
    </section>

    <!-- 待機表示（PCシグナル未受信時） -->
    <section class="waiting-note" id="waiting-note" hidden>
      <div class="spinner"></div>
      <span>PCからのデータを待機中…</span>
    </section>

    <!-- 履歴 -->
    <section class="history-section">
      <h2 class="history-title">最近のシグナル</h2>
      <ul class="history-list" id="history-list">
        <li class="history-empty" id="history-empty">まだシグナルはありません</li>
      </ul>
    </section>

    <!-- 設定 -->
    <section class="settings-section">
      <div class="settings-toggle-row">
        <span>🔔 通知音</span>
        <div class="m-toggle" id="sound-toggle"><div class="m-toggle-knob"></div></div>
      </div>
      <div class="install-hint" id="install-hint" hidden>
        💡 iPhoneは <b>共有 → ホーム画面に追加</b> でアプリ化すると、画面を閉じても通知を受け取れます。
      </div>
      <button class="settings-row danger" id="logout-button">ログアウト</button>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
