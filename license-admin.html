<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theoption Trading System - ライセンス管理ツール（開発者用）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #ffffff;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #667eea;
    }

    .subtitle {
      color: #a0aec0;
      margin-bottom: 40px;
    }

    .card {
      background: #2d3748;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e0;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #4a5568;
      border-radius: 8px;
      background: #1a202c;
      color: #ffffff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #667eea;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .generate-btn {
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
      margin-bottom: 12px;
    }

    .result {
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
      white-space: pre-wrap;
    }

    .result.success {
      background: rgba(72, 187, 120, 0.2);
      border-left: 3px solid #48bb78;
      color: #9ae6b4;
    }

    .result.error {
      background: rgba(245, 101, 101, 0.2);
      border-left: 3px solid #f56565;
      color: #fc8181;
    }

    .license-key-display {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      padding: 12px;
      background: #1a202c;
      border-radius: 4px;
      margin: 12px 0;
      text-align: center;
      letter-spacing: 2px;
    }

    .info-text {
      font-size: 14px;
      color: #a0aec0;
      margin-top: 8px;
    }

    .history {
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      padding: 12px;
      background: #1a202c;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-key {
      font-family: 'Courier New', monospace;
      color: #667eea;
      font-weight: 600;
    }

    .history-user {
      color: #cbd5e0;
      font-size: 14px;
    }

    .history-expiry {
      color: #718096;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 ライセンス管理ツール</h1>
    <p class="subtitle">Theoption Trading System - 完全自動発行システム（開発者用）</p>

    <!-- ライセンス発行フォーム -->
    <div class="card">
      <h2 style="margin-bottom: 20px;">新規ライセンス発行</h2>

      <div class="form-group">
        <label>ライセンスキー</label>
        <input type="text" id="licenseKey" placeholder="THEO-XXXX-XXXX-XXXX" readonly>
        <p class="info-text">「ランダム生成」ボタンでライセンスキーを自動生成できます</p>
      </div>

      <button class="generate-btn" onclick="generateLicenseKey()">🎲 ランダム生成</button>

      <div class="form-group">
        <label>購入者名</label>
        <input type="text" id="userName" placeholder="例: 山田太郎">
      </div>

      <div class="form-group">
        <label>最大デバイス数</label>
        <input type="number" id="maxDevices" value="1" min="1" max="10">
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="hasExpiry" onchange="toggleExpiryDate()">
          <label style="margin: 0;">有効期限を設定する</label>
        </div>
      </div>

      <div class="form-group" id="expiryGroup" style="display: none;">
        <label>有効期限</label>
        <input type="date" id="expiryDate">
      </div>

      <button onclick="createLicense()">✅ ライセンスを発行（Firestoreに自動登録）</button>

      <div class="result" id="result"></div>
    </div>

    <!-- 発行履歴 -->
    <div class="card">
      <h2 style="margin-bottom: 20px;">発行履歴</h2>
      <div class="history" id="history">
        <p style="color: #a0aec0; text-align: center;">まだライセンスが発行されていません</p>
      </div>
    </div>
  </div>

  <script>
    // Firebase設定（license-manager.jsと同じ）
    const FIREBASE_CONFIG = {
      projectId: 'theoption-license',
      apiKey: 'AIzaSyCuPbyOoP3-ILBBNLzx70ox2grmgjhknEQ'
    };

    const LICENSE_COLLECTION = 'licenses';

    // 発行履歴（ローカルストレージに保存）
    let licenseHistory = JSON.parse(localStorage.getItem('licenseHistory') || '[]');

    // ページ読み込み時
    window.onload = function() {
      displayHistory();

      // デフォルトの有効期限を1年後に設定
      const oneYearLater = new Date();
      oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
      document.getElementById('expiryDate').value = oneYearLater.toISOString().split('T')[0];
    };

    // ランダムなライセンスキーを生成
    function generateLicenseKey() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const segments = [];

      for (let i = 0; i < 4; i++) {
        let segment = '';
        for (let j = 0; j < 4; j++) {
          segment += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        segments.push(segment);
      }

      const licenseKey = `THEO-${segments.join('-')}`;
      document.getElementById('licenseKey').value = licenseKey;
    }

    // 有効期限入力の表示/非表示
    function toggleExpiryDate() {
      const hasExpiry = document.getElementById('hasExpiry').checked;
      document.getElementById('expiryGroup').style.display = hasExpiry ? 'block' : 'none';
    }

    // ライセンスを作成（Firestore REST APIで自動登録）
    async function createLicense() {
      const licenseKey = document.getElementById('licenseKey').value.trim();
      const userName = document.getElementById('userName').value.trim();
      const maxDevices = parseInt(document.getElementById('maxDevices').value);
      const hasExpiry = document.getElementById('hasExpiry').checked;
      const expiryDate = document.getElementById('expiryDate').value;

      // バリデーション
      if (!licenseKey) {
        showResult('error', 'ライセンスキーを生成してください');
        return;
      }

      if (!userName) {
        showResult('error', '購入者名を入力してください');
        return;
      }

      if (maxDevices < 1) {
        showResult('error', '最大デバイス数は1以上にしてください');
        return;
      }

      // ボタンを無効化
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '発行中...';

      try {
        // Firestoreドキュメントのフィールド構造
        const fields = {
          active: { booleanValue: true },
          userName: { stringValue: userName },
          maxDevices: { integerValue: maxDevices.toString() }
        };

        // 有効期限がある場合のみ追加
        if (hasExpiry && expiryDate) {
          const expiryTimestamp = new Date(expiryDate).toISOString();
          fields.expiryDate = { timestampValue: expiryTimestamp };
        }

        // Firestore REST APIでドキュメント作成
        const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_CONFIG.projectId}/databases/(default)/documents/${LICENSE_COLLECTION}?documentId=${licenseKey}&key=${FIREBASE_CONFIG.apiKey}`;

        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || `HTTP ${response.status}`);
        }

        // 成功
        const expiryInfo = hasExpiry ? `\n有効期限: ${expiryDate}` : '\n有効期限: 無期限';
        showResult('success', `✅ ライセンスキーを発行しました！\n\n${licenseKey}\n\n購入者: ${userName}\nデバイス数: ${maxDevices}台${expiryInfo}\n\nFirestoreへの登録も完了しました。\nこのライセンスキーを購入者に送信してください。`);

        // 履歴に追加
        licenseHistory.unshift({
          key: licenseKey,
          userName: userName,
          maxDevices: maxDevices,
          hasExpiry: hasExpiry,
          expiryDate: hasExpiry ? expiryDate : null,
          createdAt: new Date().toISOString()
        });

        // 最大20件まで保存
        if (licenseHistory.length > 20) {
          licenseHistory = licenseHistory.slice(0, 20);
        }

        localStorage.setItem('licenseHistory', JSON.stringify(licenseHistory));
        displayHistory();

        // フォームをリセット
        document.getElementById('userName').value = '';
        generateLicenseKey();

      } catch (error) {
        console.error('[Admin] エラー:', error);
        showResult('error', `❌ エラー: ${error.message}\n\nFirestoreへの接続に失敗しました。\nインターネット接続とFirebase設定を確認してください。`);
      } finally {
        btn.disabled = false;
        btn.textContent = '✅ ライセンスを発行（Firestoreに自動登録）';
      }
    }

    // 結果を表示
    function showResult(type, message) {
      const resultEl = document.getElementById('result');
      resultEl.className = `result ${type}`;
      resultEl.style.display = 'block';
      resultEl.textContent = message;

      // 10秒後に非表示
      setTimeout(() => {
        resultEl.style.display = 'none';
      }, 10000);
    }

    // 履歴を表示
    function displayHistory() {
      const historyEl = document.getElementById('history');

      if (licenseHistory.length === 0) {
        historyEl.innerHTML = '<p style="color: #a0aec0; text-align: center;">まだライセンスが発行されていません</p>';
        return;
      }

      historyEl.innerHTML = licenseHistory.map(item => {
        const expiryText = item.hasExpiry
          ? `<div class="history-expiry">有効期限: ${item.expiryDate}</div>`
          : `<div class="history-expiry">有効期限: 無期限</div>`;

        return `
          <div class="history-item">
            <div>
              <div class="history-key">${item.key}</div>
              <div class="history-user">${item.userName} (${item.maxDevices}台)</div>
              ${expiryText}
            </div>
            <div style="text-align: right; font-size: 12px; color: #718096;">
              ${new Date(item.createdAt).toLocaleDateString('ja-JP')}
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
