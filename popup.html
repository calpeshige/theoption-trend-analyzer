<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOption Trend Analyzer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 TheOption Trend Analyzer</h1>
      <p class="version">v4.2.0</p>
      <p class="subtitle">高精度テクニカル分析 + AI予測</p>
      <p class="description">超短期取引専用分析ツール</p>
    </header>

    <main class="menu-panel">
      <button class="menu-button" id="settingsBtn">
        <span class="menu-icon">⚙️</span>
        <div class="menu-content">
          <div class="menu-title">設定</div>
          <div class="menu-desc">表示設定やフォントサイズの調整</div>
        </div>
      </button>

      <button class="menu-button" id="licenseBtn">
        <span class="menu-icon">🔑</span>
        <div class="menu-content">
          <div class="menu-title">ライセンス管理</div>
          <div class="menu-desc">ライセンスキーの登録・確認</div>
        </div>
      </button>

      <button class="menu-button" id="guideBtn">
        <span class="menu-icon">📖</span>
        <div class="menu-content">
          <div class="menu-title">使い方ガイド</div>
          <div class="menu-desc">機能説明と使用方法</div>
        </div>
      </button>

      <button class="menu-button" id="versionBtn">
        <span class="menu-icon">ℹ️</span>
        <div class="menu-content">
          <div class="menu-title">バージョン情報</div>
          <div class="menu-desc">更新履歴と機能一覧</div>
        </div>
      </button>
    </main>

    <div class="usage-info">
      <h3>💡 使用方法</h3>
      <p>TheOptionのトレーディング画面を開くと自動的に分析が開始されます</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
