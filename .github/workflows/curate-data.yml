name: Curate Community Data

on:
  schedule:
    # 【テスト用】毎日 13:30 JST (UTC 04:30) ← 動作確認後 03:00 JST (UTC 18:00) に戻すこと
    - cron: '30 4 * * *'
    # 本番用 (テスト後に有効化):
    # - cron: '0 18 * * *'
  # 手動実行可能
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis stream-json stream-chain

      - name: Run curation script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          DELETE_SECRET: ${{ secrets.DELETE_SECRET }}
        run: node scripts/curate-from-drive.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/trading-manual.html data-meta/ || true
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "🤖 Auto-update community data $(date -u +%Y-%m-%d)"
            git push
          fi
